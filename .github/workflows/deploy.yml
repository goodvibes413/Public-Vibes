name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/rainforest-rescue-game-rb7MU

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rainforest-rescue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rainforest-rescue/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_URL: /Public-Vibes
      - uses: actions/upload-pages-artifact@v3
        with:
          path: rainforest-rescue/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
